<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paket Lager</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body class="locked">

<div id="authScreen" class="auth-screen">
<div class="auth-card">

<h2>Anmeldung</h2>

<div class="field">
<label>Benutzername</label>
<input id="authUsername">
</div>

<div class="field">
<label>Passwort</label>
<input id="authPassword" type="password">
</div>

<button id="authLoginBtn" class="primary">Login</button>

<div id="authStatus" class="status"></div>

</div>
</div>


<div class="app">

<h1>Paketlager</h1>

<div class="tabs">
<button class="tab-btn active" data-tab="annahme">Annahme</button>
<button class="tab-btn" data-tab="suche">Suche</button>
<button class="tab-btn" data-tab="settings">Einstellungen</button>
</div>


<section id="tab-annahme" class="tab-panel">

<div class="card">

<h2>Neues Paket</h2>

<button id="newPackageBtn" class="primary">
Neues Paket
</button>

<input id="packageImageInput"
type="file"
accept="image/*"
capture="environment"
class="hidden">


<div class="field">
<label>OCR Text</label>
<textarea id="ocrText"></textarea>
</div>


<div class="row">

<div class="field">
<label>Vorname</label>
<input id="firstName">
</div>

<div class="field">
<label>Name</label>
<input id="lastName">
</div>

</div>


<div class="row">

<div class="field">
<label>Straße</label>
<input id="street">
</div>

<div class="field">
<label>Hausnummer</label>
<input id="houseNumber">
</div>

</div>


<div class="row">

<div class="field">
<label>PLZ</label>
<input id="postalCode">
</div>

<div class="field">
<label>Ort</label>
<input id="city">
</div>

</div>


<div class="field">
<label>Lagernummer</label>
<input id="storageNumber" readonly>
</div>


<div class="field">
<label>Notiz</label>
<input id="notes">
</div>


<div class="button-grid">

<button id="saveBtn" class="primary">
Speichern
</button>

<button id="printBtn">
Drucken
</button>

<button id="clearBtn" class="danger">
Leeren
</button>

</div>

<div id="acceptStatus" class="status"></div>

</div>

</section>


<section id="tab-suche" class="tab-panel hidden">

<div class="card">

<h2>Pakete</h2>

<input id="searchInput" placeholder="Suche">

<div class="button-grid">

<button id="searchBtn">Suche</button>
<button id="showAllBtn">Alle</button>

</div>

<div id="results"></div>

</div>

</section>


<section id="tab-settings" class="tab-panel hidden">

<div class="card">

<button id="logoutBtn" class="danger">
Logout
</button>

</div>

</section>


<div id="printLabel" class="hidden"></div>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Paketlager</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body class="locked">

<div id="auth">

<h2>Login</h2>

<input id="user" placeholder="Benutzer">
<input id="pass" type="password" placeholder="Passwort">

<button id="login">Login</button>

<div id="loginStatus"></div>

</div>


<div id="app">

<h1>Paketlager</h1>

<div class="stats">

<div>Belegt <b id="used">0</b></div>
<div>Frei <b id="free">500</b></div>
<div>Gesamt <b>500</b></div>

</div>


<button id="scanBtn" class="big">
📷 Paket scannen
</button>

<input id="imageInput" type="file" accept="image/*" capture="environment" class="hidden">


<textarea id="ocrText" placeholder="OCR Text"></textarea>


<div class="grid">

<input id="first" placeholder="Vorname">
<input id="last" placeholder="Name">

<input id="street" placeholder="Straße">
<input id="house" placeholder="Hausnummer">

<input id="plz" placeholder="PLZ">
<input id="city" placeholder="Ort">

</div>

<input id="storage" readonly placeholder="Lagernummer">


<input id="notes" placeholder="Notiz">


<div class="buttons">

<button id="save">Speichern</button>
<button id="print">ZPL</button>
<button id="clear">Leeren</button>

</div>


<input id="search" placeholder="Suche">

<button id="searchBtn">Suchen</button>

<div id="list"></div>


<button id="logout">Logout</button>

</div>


<script src="app.js"></script>

</body>
</html>
